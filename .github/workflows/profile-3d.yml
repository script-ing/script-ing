name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v3
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          python3 -c '
          import re
          with open("profile-3d-contrib/profile-night-green.svg", "r", encoding="utf-8") as f:
              data = f.read()
          data = data.replace("fill=\"#00000f\"", "fill=\"transparent\"")
          data = data.replace("transform=\"translate(40, 520)\"", "display=\"none\"")
          data = re.sub(r"<g transform=\"translate\(608, 802\), scale\(2\)\"><path[^>]*></path></g><text[^>]*>0<title>0</title></text>", "", data)
          data = re.sub(r"<g transform=\"translate\(736, 802\), scale\(2\)\"><path[^>]*></path></g><text[^>]*>0<title>0</title></text>", "", data)
          data = re.sub(r"<g class=\"axis\">.*?<title>0</title></text></g>", "", data)
          data = re.sub(r"<text[^>]*>\d+</text><text[^>]*>contributions</text>", "", data)
          with open("profile-3d-contrib/profile-night-green.svg", "w", encoding="utf-8") as f:
              f.write(data)
          '
          git add -A .
          if ! git diff --staged --quiet; then
            git commit -m "docs: generated 3d contribution calendar"
            git push
          else
            echo "No changes to commit"
          fi
